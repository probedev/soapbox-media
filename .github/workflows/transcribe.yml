#
# MANUAL-ONLY transcribe job. As of v0.6.14, Vercel cron handles
# transcribe natively via Supadata's managed API — no scraping, no
# cloud-IP issues. This workflow is kept around as a manual escape
# hatch for ad-hoc catch-up runs (e.g. if Supadata has an outage and we
# want to retry from a different egress). Not scheduled.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPADATA_API_KEY
#
# Manual trigger: Actions tab → "Manual transcribe" → Run workflow.
#
name: Manual transcribe

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Episode limit for this run"
        required: false
        default: "100"

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Note: the soapbox directory IS the git repo root on GitHub —
    # `actions/checkout` puts package.json, src/, etc. directly at the
    # workspace root with no nested subdirectory. Don't set a
    # working-directory or cache-dependency-path that assumes nesting.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22+ is required because @supabase/realtime-js relies on
          # the global WebSocket constructor, which Node only ships
          # natively from 22 onward. Older Node fails with "Node.js 20
          # detected without native WebSocket support". Bump in lockstep
          # with the version pinned in your local toolchain.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run transcribe
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: npm run transcribe -- ${{ github.event.inputs.limit || '100' }}
