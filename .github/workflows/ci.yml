name: CI

# Tests + build on every push to main and on PRs. Vercel already builds on push
# but doesn't run the unit tests as a gate - this makes them non-optional.
# `next build` is the type-check gate: it runs tsc (no ignoreBuildErrors) AND
# generates next-env.d.ts first (the gitignored file that declares image-module
# types). A standalone `tsc --noEmit` would FAIL in a fresh checkout because
# next-env.d.ts isn't there yet, so we let build do the type-checking. No DB
# needed (pages are force-dynamic; env is read lazily at request time).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Placeholders so the build can't trip a lazy env read. Pages are
          # force-dynamic (no DB at build); these are never used to connect.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
