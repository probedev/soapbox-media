<?xml version="1.0" encoding="UTF-8"?>
<!--
  Soapbox Index needle - the signature gauge. L10 (left) to R10 (right),
  arc graded blue -> gray -> red. The needle shows the index value; here it is
  set to R+2. To show any value, rotate the #needle group: degrees = value / 10 * 90
  (0 = straight up, -90 = full left / L10, +90 = full right / R10).
  Colors: blue #2563EB (left), red #DC2626 (right), ink #111827 (needle).
-->
<svg viewBox="0 0 400 260" width="420" height="260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Soapbox Index needle">
  <defs>
    <linearGradient id="gauge-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Gauge arc -->
  <path d="M 50 200 A 150 150 0 0 1 350 200" stroke="url(#gauge-gradient)" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Tick marks at L10, L5, 0, R5, R10 -->
  <g stroke="#9ca3af" stroke-width="2">
    <line x1="68" y1="200" x2="46" y2="200"/>
    <line x1="106.66" y1="106.66" x2="91.11" y2="91.11"/>
    <line x1="200" y1="68" x2="200" y2="46"/>
    <line x1="293.34" y1="106.66" x2="308.89" y2="91.11"/>
    <line x1="332" y1="200" x2="354" y2="200"/>
  </g>

  <!-- End labels -->
  <g font-family="Geist, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" text-anchor="middle">
    <text x="50" y="228" font-size="14" font-weight="600" fill="#2563eb">L 10</text>
    <text x="200" y="36" font-size="13" fill="#6b7280">0</text>
    <text x="350" y="228" font-size="14" font-weight="600" fill="#dc2626">R 10</text>
  </g>

  <!-- Needle (R+2 = rotate 18deg). Change the rotate() to set any value. -->
  <g id="needle" transform="rotate(18 200 200)">
    <line x1="200" y1="200" x2="200" y2="70" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  </g>
  <circle cx="200" cy="200" r="9" fill="#111827"/>
  <circle cx="200" cy="200" r="3.5" fill="#ffffff"/>
</svg>
